version: "3.8"

services:
  evidence-ai-backend:
    build:
      context: ./backend
    container_name: evidence-ai-backend
    ports:
      - "8009:8009"
    environment:
      - USE_MOCK_SERVICES=true
    volumes:
      - ./mock_data:/app/mock_data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  evidence-ai-frontend:
    image: node:18-alpine
    container_name: evidence-ai-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3009:3009"
    environment:
      - VITE_API_URL=http://localhost:8009
    depends_on:
      - evidence-ai-backend
