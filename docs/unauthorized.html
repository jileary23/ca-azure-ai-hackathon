<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — CA Hackathon Docs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      padding: 2.5rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #555; line-height: 1.6; margin-bottom: 1.25rem; }
    .actions a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      margin: 0.25rem;
    }
    .btn-primary { background: #0366d6; color: #fff; }
    .btn-secondary { background: #e1e4e8; color: #24292e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Access Denied</h1>
    <p>
      You've authenticated successfully, but your account hasn't been invited to this site yet.
      Ask a project admin to invite your GitHub username in the Azure Portal under
      <strong>Static Web App → Role management</strong>.
    </p>
    <div class="actions">
      <a href="/.auth/logout" class="btn-secondary">Sign Out</a>
    </div>
  </div>
</body>
</html>
