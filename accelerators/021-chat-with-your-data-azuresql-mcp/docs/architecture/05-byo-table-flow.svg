<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#605E5C"/>
    </marker>
  </defs>

  <!-- SQL wrapper -->
  <rect x="20" y="60" width="960" height="180" rx="10" fill="none" stroke="#CC2927" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="32" y="80" fill="#CC2927" font-size="12" font-weight="600">Azure SQL Database</text>

  <!-- Existing table -->
  <rect x="40" y="100" width="160" height="60" rx="6" fill="#CC2927"/>
  <text x="120" y="124" text-anchor="middle" fill="#fff" font-weight="700">Your table</text>
  <text x="120" y="142" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9" font-family="Consolas, monospace">dbo.MyDocs</text>

  <!-- + VECTOR -->
  <rect x="220" y="100" width="160" height="60" rx="6" fill="#10A37F"/>
  <text x="300" y="124" text-anchor="middle" fill="#fff" font-weight="700">+ vector column</text>
  <text x="300" y="142" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9" font-family="Consolas, monospace">VECTOR(1536)</text>

  <!-- + FT index -->
  <rect x="400" y="100" width="160" height="60" rx="6" fill="#10A37F"/>
  <text x="480" y="124" text-anchor="middle" fill="#fff" font-weight="700">+ full-text index</text>
  <text x="480" y="142" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">on the text column</text>

  <!-- + Search SP -->
  <rect x="580" y="100" width="180" height="60" rx="6" fill="#10A37F"/>
  <text x="670" y="124" text-anchor="middle" fill="#fff" font-weight="700">+ search SP</text>
  <text x="670" y="142" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9" font-family="Consolas, monospace">find_similar_mydocs_hybrid</text>

  <!-- Reuse EM -->
  <rect x="780" y="100" width="180" height="60" rx="6" fill="#FFB900"/>
  <text x="870" y="124" text-anchor="middle" fill="#000" font-weight="700">EXTERNAL MODEL</text>
  <text x="870" y="142" text-anchor="middle" fill="#000" font-size="11" opacity="0.85">EmbeddingModel · reused</text>

  <path d="M200,130 L218,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M380,130 L398,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M560,130 L578,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M760,130 L778,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Legend -->
  <rect x="40" y="184" width="14" height="14" fill="#10A37F"/>
  <text x="60" y="195" fill="#605E5C" font-size="11">new per BYO table</text>
  <rect x="200" y="184" width="14" height="14" fill="#FFB900"/>
  <text x="220" y="195" fill="#605E5C" font-size="11">reused, unchanged from steps 1–3</text>
  <text x="500" y="195" text-anchor="middle" fill="#605E5C" font-size="11" font-style="italic">Auth chain (UAMI → DSC → MI bearer token) needs no changes.</text>

  <!-- DAB box -->
  <rect x="180" y="270" width="640" height="80" rx="6" fill="#0078D4"/>
  <text x="500" y="296" text-anchor="middle" fill="#fff" font-weight="700">Data API Builder · dab-config.json</text>
  <text x="500" y="318" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">+ entity: MyDoc (read_records)</text>
  <text x="500" y="334" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">+ entity: FindSimilarMyDocsHybrid (execute_entity)</text>

  <path d="M120,160 L120,250 L300,270" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)" stroke-dasharray="4 3"/>
  <path d="M670,160 L670,250 L660,270" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)" stroke-dasharray="4 3"/>
  <text x="200" y="262" fill="#605E5C" font-size="11" font-style="italic">table → entity</text>
  <text x="700" y="262" fill="#605E5C" font-size="11" font-style="italic">SP → entity</text>

  <!-- Clients -->
  <rect x="20" y="390" width="300" height="60" rx="6" fill="#0078D4"/>
  <text x="170" y="414" text-anchor="middle" fill="#fff" font-weight="700">VS Code Copilot Chat</text>
  <text x="170" y="432" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">discovers via describe_entities</text>

  <rect x="350" y="390" width="300" height="60" rx="6" fill="#0078D4"/>
  <text x="500" y="414" text-anchor="middle" fill="#fff" font-weight="700">Streamlit web app</text>
  <text x="500" y="432" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">REST GET / POST</text>

  <rect x="680" y="390" width="300" height="60" rx="6" fill="#0078D4"/>
  <text x="830" y="414" text-anchor="middle" fill="#fff" font-weight="700">Foundry agent</text>
  <text x="830" y="432" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">MCP tool call</text>

  <path d="M250,350 L170,390" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M500,350 L500,390" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M750,350 L830,390" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
</svg>
