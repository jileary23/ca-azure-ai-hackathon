<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#605E5C"/>
    </marker>
  </defs>

  <!-- Left: v1 -->
  <text x="20" y="30" fill="#CC2927" font-size="16" font-weight="700">v1 — endpoint + deployment as SP params</text>

  <rect x="20" y="50" width="440" height="60" rx="6" fill="#CC2927"/>
  <text x="240" y="74" text-anchor="middle" fill="#fff" font-weight="700">Caller (REST body / MCP args)</text>
  <text x="240" y="94" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">openAiEndpoint, embeddingDeployment, queryText, top</text>

  <path d="M240,110 L240,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="20" y="130" width="440" height="60" rx="6" fill="#0078D4"/>
  <text x="240" y="154" text-anchor="middle" fill="#fff" font-weight="700" font-family="Consolas, monospace" font-size="12">find_similar_reviews_hybrid (v1)</text>
  <text x="240" y="174" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">@openAiEndpoint, @embeddingDeployment, @queryText, @top</text>

  <path d="M240,190 L240,210" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="20" y="210" width="440" height="60" rx="6" fill="#0078D4"/>
  <text x="240" y="234" text-anchor="middle" fill="#fff" font-weight="700" font-family="Consolas, monospace" font-size="12">dbo.get_embedding</text>
  <text x="240" y="254" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">wraps sp_invoke_external_rest_endpoint</text>

  <path d="M240,270 L240,290" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="20" y="290" width="440" height="60" rx="6" fill="#FFB900"/>
  <text x="240" y="314" text-anchor="middle" fill="#000" font-weight="700">DSC · IDENTITY = 'Managed Identity'</text>
  <text x="240" y="334" text-anchor="middle" fill="#000" font-size="11" opacity="0.85">named after endpoint URL · UAMI bearer token</text>

  <path d="M240,350 L240,370" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="20" y="370" width="440" height="60" rx="6" fill="#10A37F"/>
  <text x="240" y="394" text-anchor="middle" fill="#fff" font-weight="700">Azure OpenAI</text>
  <text x="240" y="414" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">text-embedding-3-small</text>

  <text x="20" y="464" fill="#CC2927" font-size="13" font-weight="700">Problem</text>
  <text x="20" y="484" fill="#605E5C" font-size="11">Caller must know the OpenAI endpoint and deployment name.</text>
  <text x="20" y="500" fill="#605E5C" font-size="11">Infrastructure topology leaks into every API call and MCP tool schema.</text>

  <!-- Right: v2 -->
  <text x="540" y="30" fill="#10A37F" font-size="16" font-weight="700">v2 — EXTERNAL MODEL registered once</text>

  <rect x="540" y="50" width="440" height="60" rx="6" fill="#10A37F"/>
  <text x="760" y="74" text-anchor="middle" fill="#fff" font-weight="700">Caller (REST body / MCP args)</text>
  <text x="760" y="94" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">queryText, top</text>

  <path d="M760,110 L760,130" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="540" y="130" width="440" height="60" rx="6" fill="#0078D4"/>
  <text x="760" y="154" text-anchor="middle" fill="#fff" font-weight="700" font-family="Consolas, monospace" font-size="12">find_similar_reviews_hybrid (v2)</text>
  <text x="760" y="174" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">@queryText, @top</text>

  <path d="M760,190 L760,210" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="540" y="210" width="440" height="60" rx="6" fill="#10A37F"/>
  <text x="760" y="234" text-anchor="middle" fill="#fff" font-weight="700">AI_GENERATE_EMBEDDINGS</text>
  <text x="760" y="254" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">USE MODEL EmbeddingModel</text>

  <path d="M760,270 L760,290" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="540" y="290" width="440" height="60" rx="6" fill="#FFB900"/>
  <text x="760" y="314" text-anchor="middle" fill="#000" font-weight="700">EXTERNAL MODEL EmbeddingModel · DSC</text>
  <text x="760" y="334" text-anchor="middle" fill="#000" font-size="11" opacity="0.85">endpoint + deployment baked in once · UAMI bearer token</text>

  <path d="M760,350 L760,370" stroke="#605E5C" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="540" y="370" width="440" height="60" rx="6" fill="#10A37F"/>
  <text x="760" y="394" text-anchor="middle" fill="#fff" font-weight="700">Azure OpenAI</text>
  <text x="760" y="414" text-anchor="middle" fill="#fff" font-size="11" opacity="0.9">text-embedding-3-small (same deployment)</text>

  <text x="540" y="464" fill="#10A37F" font-size="13" font-weight="700">Result</text>
  <text x="540" y="484" fill="#605E5C" font-size="11">SP signature collapses to (queryText, top).</text>
  <text x="540" y="500" fill="#605E5C" font-size="11">No DAB rebuild — runtime SP reflection picks up the new shape.</text>
</svg>
